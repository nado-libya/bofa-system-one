                            if(['bonus','salary'].includes(t.type)) add += Number(t.amount);
                            if(['deduction','advance'].includes(t.type)) sub += Number(t.amount);
                        });
                        const net = Number(emp.basicSalary) + add - sub;
                        totalBasic += Number(emp.basicSalary); totalNet += net;
                        return `<tr>
                            <td><strong>${emp.name}</strong></td>
                            <td>${emp.job || '-'}</td>
                            <td>${formatMoney(emp.basicSalary)}</td>
                            <td style="color: #16a34a;">+${formatMoney(add)}</td>
                            <td style="color: #dc2626;">-${formatMoney(sub)}</td>
                            <td><strong>${formatMoney(net)}</strong></td>
                        </tr>`;
                    }).join('');

                    if(template === 'classic') {
                        contentHtml = `
                            <table>
                                <thead><tr><th>الاسم</th><th>الأساسي</th><th>إضافات</th><th>خصومات</th><th>الصافي</th></tr></thead>
                                <tbody>${rows}</tbody>
                            </table>
                            <div class="totals">
                                <div class="total-box"><span>إجمالي الأساسي:</span><span>${formatMoney(totalBasic)} ${settings.currency}</span></div>
                                <div class="total-box"><span>إجمالي المستحق الدفع:</span><span>${formatMoney(totalNet)} ${settings.currency}</span></div>
                            </div>
                        `;
                    } else {
                        contentHtml = `
                            <table>
                                <thead><tr><th>الاسم</th><th>الوظيفة</th><th>الأساسي</th><th>إضافات</th><th>خصومات</th><th>الصافي المستحق</th></tr></thead>
                                <tbody>${rows}</tbody>
                            </table>
                            <div class="totals">
                                <div class="total-box"><div class="t-label">إجمالي الأساسي</div><div class="t-val">${formatMoney(totalBasic)}</div></div>
                                <div class="total-box ${template==='modern'?'primary':''}"><div class="t-label">إجمالي المطلوب دفعه</div><div class="t-val">${formatMoney(totalNet)} <span style="font-size:14px; font-weight:normal">${settings.currency}</span></div></div>
                            </div>
                        `;
                    }

                } else {
                    let totalExp = 0;
                    let rows = eData.map(e => {
                        totalExp += Number(e.amount);
                        return `<tr><td>${formatDate(e.date)}</td><td><strong>${e.name}</strong></td><td>${e.category}</td><td><strong>${formatMoney(e.amount)}</strong></td></tr>`;
                    }).join('');

                    if(template === 'classic') {
                         contentHtml = `
                            <table>
                                <thead><tr><th>التاريخ</th><th>البيان</th><th>التصنيف</th><th>القيمة</th></tr></thead>
                                <tbody>${rows || '<tr><td colspan="4" style="text-align:center">لا توجد بيانات</td></tr>'}</tbody>
                            </table>
                            <div class="totals"><div class="total-box"><span>إجمالي المصروفات:</span><span>${formatMoney(totalExp)} ${settings.currency}</span></div></div>
                        `;
                    } else {
                        contentHtml = `
                            <table>
                                <thead><tr><th>التاريخ</th><th>البيان</th><th>التصنيف</th><th>القيمة</th></tr></thead>
                                <tbody>${rows || '<tr><td colspan="4" style="text-align:center">لا توجد بيانات</td></tr>'}</tbody>
                            </table>
                            <div class="totals">
                                <div class="total-box ${template==='modern'?'primary':''}"><div class="t-label">إجمالي المصروفات</div><div class="t-val">${formatMoney(totalExp)} <span style="font-size:14px; font-weight:normal">${settings.currency}</span></div></div>
                            </div>
                        `;
                    }
                }

                setReportHtml(`
                    <style>${selectedCss}</style>
                    <div class="report-wrapper">
                        <div class="header">
                            <div class="logo-area">
                                <h1>${settings.companyName}</h1>
                                <p>التقرير المالي الدوري</p>
                            </div>
                            <div class="title-area">
                                <h2>${title}</h2>
                                <p>عن الفترة: ${periodName} | تاريخ الإصدار: ${currentDate}</p>
                            </div>
                        </div>
                        ${contentHtml}
                        <div style="margin-top: 50px; border-top: 1px solid #ccc; padding-top: 20px; text-align: center; font-size: 11px; color: #666; ${template==='classic'? 'border-top: 1px dashed #000;':''}">
                            تم إنشاء هذا التقرير آلياً بواسطة نظام BØFA Manager Pro. توقيع المحاسب / المدير: ..........................
                        </div>
                    </div>
                `);
            };

            return (
                <div className="max-w-4xl mx-auto space-y-6 animate-fade-in pb-24">
                    <div className="bg-white p-6 md:p-8 rounded-[2rem] shadow-sm border border-slate-100">
                        <h2 className="text-2xl font-black mb-2 text-slate-800">مولد التقارير الذكي</h2>
                        <p className="text-slate-500 mb-8 font-medium">قم بتخصيص التقرير، اختر القالب المناسب، واطبعه أو احفظه كـ PDF.</p>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                            <div>
                                <label className="block text-sm font-bold text-slate-700 mb-2">نوع التقرير البيانات</label>
                                <select className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-primary/20 outline-none font-bold" value={reportType} onChange={e => setReportType(e.target.value)}>
                                    <option value="all_employees">تقرير رواتب الموظفين الشامل</option>
                                    <option value="expenses">تقرير المصروفات والتشغيل</option>
                                </select>
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-slate-700 mb-2">الفترة الزمنية</label>
                                <select className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-primary/20 outline-none font-bold" value={period} onChange={e => setPeriod(e.target.value)}>
                                    <option value="active">الفترة الحالية (النشطة)</option>
                                    {archives.map(a => <option key={a.id} value={a.id}>أرشيف: {a.name}</option>)}
                                </select>
                            </div>
                        </div>

                        <div className="mb-10">
                            <label className="block text-sm font-bold text-slate-700 mb-3">قالب الطباعة (Template)</label>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                {[{id:'modern', name:'قالب حديث', desc:'تصميم عصري وملون', icon:'fa-wand-magic-sparkles'}, 
                                  {id:'corporate', name:'قالب رسمي', desc:'تصميم هندسي للشركات', icon:'fa-building'}, 
                                  {id:'classic', name:'قالب كلاسيكي', desc:'أبيض وأسود مبسط', icon:'fa-receipt'}].map(t => (
                                    <div key={t.id} onClick={() => setTemplate(t.id)} className={`cursor-pointer border-2 rounded-2xl p-4 text-center transition-all ${template === t.id ? 'border-primary bg-blue-50 ring-4 ring-primary/10' : 'border-slate-100 hover:border-slate-300 hover:bg-slate-50'}`}>
                                        <div className={`w-12 h-12 mx-auto rounded-full flex items-center justify-center mb-3 ${template === t.id ? 'bg-primary text-white' : 'bg-slate-200 text-slate-500'}`}>
                                            <i className={`fas ${t.icon} text-lg`}></i>
                                        </div>
                                        <div className={`font-bold text-lg mb-1 ${template === t.id ? 'text-primary' : 'text-slate-700'}`}>{t.name}</div>
                                        <div className="text-xs text-slate-500">{t.desc}</div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <button onClick={generateReport} className="w-full bg-dark hover:bg-slate-800 text-white font-bold py-4 rounded-xl transition shadow-xl shadow-slate-900/20 flex justify-center items-center gap-3 text-lg">
                            <i className="fas fa-file-pdf"></i> إنشاء وعرض التقرير
                        </button>
                    </div>
                </div>
            );
        }

        // --- View: Settings ---
        function SettingsView({ settings, setSettings, setPin, employees, transactions, expenses, archives }) {
            const handleBackup = () => {
                const data = { employees, transactions, expenses, archives, settings };
                const blob = new Blob([JSON.stringify(data)], {type: "application/json"});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `BOFA_Backup_${new Date().toISOString().slice(0,10)}.json`;
                a.click();
            };

            const handleRestore = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if(data.employees && data.settings) {
                            window.localStorage.setItem('bofa_employees_v2', JSON.stringify(data.employees));
                            window.localStorage.setItem('bofa_transactions_v2', JSON.stringify(data.transactions));
                            window.localStorage.setItem('bofa_expenses_v2', JSON.stringify(data.expenses));
                            window.localStorage.setItem('bofa_archives_v2', JSON.stringify(data.archives || []));
                            window.localStorage.setItem('bofa_settings_v2', JSON.stringify(data.settings));
                            alert('تم استعادة النسخة الاحتياطية بنجاح! سيتم إعادة تحميل المنظومة.');
                            window.location.reload();
                        } else alert('ملف النسخة الاحتياطية غير صالح.');
                    } catch(err) { alert('حدث خطأ أثناء قراءة الملف.'); }
                };
                reader.readAsText(file);
            };

            return (
                <div className="max-w-3xl mx-auto space-y-6 pb-24 animate-fade-in">
                    <div className="bg-white p-6 md:p-8 rounded-[2rem] shadow-sm border border-slate-100">
                        <h3 className="text-xl font-black text-slate-800 mb-6 flex items-center gap-3"><i className="fas fa-building text-primary"></i> إعدادات المؤسسة</h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label className="block text-sm font-bold text-slate-700 mb-2">اسم المنشأة / المنظومة</label>
                                <input type="text" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary/20 outline-none font-bold text-slate-800" value={settings.companyName} onChange={e => setSettings({...settings, companyName: e.target.value})} placeholder="أدخل اسم شركتك" />
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-slate-700 mb-2">العملة المحلية</label>
                                <input type="text" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary/20 outline-none font-bold text-slate-800" value={settings.currency} onChange={e => setSettings({...settings, currency: e.target.value})} placeholder="مثال: د.ل، ريال، $" />
                            </div>
                        </div>
                    </div>

                    <div className="bg-white p-6 md:p-8 rounded-[2rem] shadow-sm border border-slate-100">
                        <h3 className="text-xl font-black text-slate-800 mb-6 flex items-center gap-3"><i className="fas fa-shield-halved text-emerald-500"></i> الأمان وحفظ البيانات</h3>
                        <div className="space-y-6">
                            <div className="bg-slate-50 p-6 rounded-2xl border border-slate-100">
                                <label className="block text-sm font-bold text-slate-700 mb-3">تغيير رمز الدخول (PIN)</label>
                                <input type="password" maxLength="4" placeholder="••••" className="w-full md:w-1/2 bg-white border border-slate-200 rounded-xl px-4 py-3 text-center tracking-[1em] text-2xl font-black outline-none focus:border-primary" onChange={e => { if(e.target.value.length === 4) {setPin(e.target.value); alert('تم تحديث الرمز السري بنجاح'); e.target.value='';} }} />
                                <p className="text-xs text-slate-500 mt-2">أدخل 4 أرقام لتغيير الرمز الحالي فوراً.</p>
                            </div>
                            
                            <div className="pt-2">
                                <h4 className="font-bold text-slate-800 mb-2">النسخ الاحتياطي</h4>
                                <p className="text-sm text-slate-500 mb-4 leading-relaxed">بما أن المنظومة تعمل محلياً على متصفحك، ننصحك بحفظ نسخة احتياطية من بياناتك بشكل دوري تحسباً لأي طارئ.</p>
                                <div className="flex flex-col sm:flex-row gap-4">
                                    <button onClick={handleBackup} className="flex-1 bg-dark text-white py-3.5 rounded-xl font-bold shadow-md hover:bg-slate-800 transition flex items-center justify-center gap-2">
                                        <i className="fas fa-download text-emerald-400"></i> تنزيل نسخة احتياطية
                                    </button>
                                    <label className="flex-1 bg-white text-slate-700 py-3.5 rounded-xl font-bold text-center cursor-pointer hover:bg-slate-50 transition border border-slate-200 shadow-sm flex items-center justify-center gap-2">
                                        <i className="fas fa-upload text-primary"></i> استعادة البيانات
                                        <input type="file" accept=".json" className="hidden" onChange={handleRestore} />
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- View: Archive ---
        function ArchiveView({ archives }) {
            return (
                <div className="max-w-3xl mx-auto animate-fade-in pb-24">
                    <div className="bg-slate-900 text-white p-8 rounded-[2rem] shadow-xl mb-8 flex flex-col md:flex-row items-center md:items-start gap-6 relative overflow-hidden">
                        <div className="absolute -right-20 -top-20 w-64 h-64 bg-white/5 rounded-full blur-3xl"></div>
                        <div className="w-20 h-20 bg-white/10 rounded-2xl flex items-center justify-center text-4xl shadow-inner shrink-0"><i className="fas fa-box-archive text-blue-300"></i></div>
                        <div className="text-center md:text-right z-10">
                            <h2 className="text-3xl font-black mb-2">مستودع الأرشيف</h2>
                            <p className="text-slate-400 text-sm leading-relaxed">يحتوي على كافة الفترات المالية والشهور التي تم إقفالها وتصفيرها مسبقاً. البيانات هنا هي للقراءة واستخراج التقارير فقط.</p>
                        </div>
                    </div>
                    
                    <div className="space-y-4">
                        {archives.length === 0 ? <div className="text-center text-slate-500 py-16 bg-white rounded-[2rem] border border-slate-100 font-medium">الأرشيف فارغ حالياً.</div> : 
                            archives.map(a => (
                                <div key={a.id} className="bg-white p-5 rounded-2xl border border-slate-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 shadow-sm hover:shadow-md transition">
                                    <div className="flex items-center gap-4">
                                        <div className="w-12 h-12 bg-slate-50 rounded-xl flex items-center justify-center border border-slate-100 text-slate-400"><i className="fas fa-folder-closed"></i></div>
                                        <div>
                                            <p className="font-bold text-slate-800 text-lg">{a.name}</p>
                                            <p className="text-xs text-slate-400 font-medium mt-0.5">تاريخ الإقفال: {formatDate(a.date)}</p>
                                        </div>
                                    </div>
                                    <div className="bg-emerald-50 text-emerald-600 border border-emerald-100 text-xs px-3 py-1.5 rounded-lg font-bold self-start sm:self-auto flex items-center gap-1">
                                        <i className="fas fa-lock text-[10px]"></i> فترة مغلقة
                                    </div>
                                </div>
                            ))
                        }
                    </div>
                </div>
            );
        }

        // --- Shared UI Components ---
        function BottomSheet({ title, onClose, children }) {
            return (
                <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-slate-900/60 backdrop-blur-sm transition-opacity">
                    <div className="absolute inset-0" onClick={onClose}></div>
                    <div className="bg-white w-full sm:max-w-md sm:rounded-3xl rounded-t-3xl p-6 relative z-10 bottom-sheet-enter-active max-h-[90vh] flex flex-col shadow-2xl">
                        <div className="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-5 sm:hidden"></div>
                        <div className="flex justify-between items-center mb-5 pb-3 border-b border-slate-100">
                            <h3 className="font-black text-xl text-slate-800">{title}</h3>
                            <button onClick={onClose} className="w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center text-slate-500 hover:bg-slate-200 hover:text-slate-800 transition"><i className="fas fa-times"></i></button>
                        </div>
                        <div className="overflow-y-auto no-scrollbar flex-1 pb-4">{children}</div>
                    </div>
                </div>
            );
        }

        function NavItem({ icon, label, active, onClick }) {
            return (
                <button onClick={onClick} className={`flex items-center w-full px-4 py-3.5 rounded-xl transition-all duration-200 text-right font-bold ${active ? 'bg-primary text-white shadow-md shadow-blue-500/20 translate-x-1' : 'text-slate-400 hover:bg-white/5 hover:text-white'}`}>
                    <i className={`fas ${icon} w-6 text-center ml-3 text-lg`}></i> {label}
                </button>
            );
        }

        function MobileNavItem({ icon, label, active, main, onClick }) {
            if (main) return (
                <button onClick={onClick} className="relative -top-5 w-14 h-14 bg-gradient-to-tr from-primary to-blue-400 text-white rounded-full flex items-center justify-center text-2xl shadow-lg shadow-blue-500/40 border-4 border-white transform active:scale-95 transition">
                    <i className={`fas ${icon}`}></i>
                </button>
            );
            return (
                <button onClick={onClick} className={`flex flex-col items-center justify-center w-16 h-full transition-colors ${active ? 'text-primary' : 'text-slate-400'}`}>
                    <i className={`fas ${icon} text-xl mb-1 ${active ? 'transform scale-110 mb-1.5' : ''} transition-all`}></i>
                    <span className={`text-[10px] ${active ? 'font-black' : 'font-medium'}`}>{label}</span>
                </button>
            );
        }

        function StatCard({ title, value, sub, icon, color }) {
            return (
                <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 relative overflow-hidden">
                    <div className={`w-12 h-12 rounded-xl flex items-center justify-center mb-4 ${color}`}>
                        <i className={`fas ${icon} text-xl`}></i>
                    </div>
                    <p className="text-slate-500 text-sm font-bold mb-1">{title}</p>
                    <h3 className="text-2xl font-black text-slate-800 truncate">{value} <span className="text-[11px] font-medium text-slate-400">{sub}</span></h3>
                </div>
            );
        }

        // --- Modals ---
        function EmployeeFormModal({ editItem, onClose, onSave }) {
            // Added workingHours field
            const [formData, setFormData] = useState(editItem || { name: '', job: '', basicSalary: '', workingHours: 240 });
            return (
                <BottomSheet title={editItem ? "تعديل بيانات الموظف" : "إضافة موظف جديد"} onClose={onClose}>
                    <div className="space-y-4">
                        <div>
                            <label className="block text-xs font-bold text-slate-500 mb-1">الاسم الكامل</label>
                            <input type="text" className="w-full border border-slate-200 rounded-xl px-4 py-3 bg-slate-50 focus:bg-white focus:border-primary outline-none font-bold" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                        </div>
                        <div>
                            <label className="block text-xs font-bold text-slate-500 mb-1">المسمى الوظيفي</label>
                            <input type="text" className="w-full border border-slate-200 rounded-xl px-4 py-3 bg-slate-50 focus:bg-white focus:border-primary outline-none font-bold" value={formData.job} onChange={e => setFormData({...formData, job: e.target.value})} />
                        </div>
                        <div className="flex gap-4">
                            <div className="flex-1">
                                <label className="block text-xs font-bold text-slate-500 mb-1">الراتب الأساسي</label>
                                <input type="number" className="w-full border border-slate-200 rounded-xl px-4 py-3 bg-slate-50 focus:bg-white focus:border-primary outline-none font-black text-primary text-left" dir="ltr" value={formData.basicSalary} onChange={e => setFormData({...formData, basicSalary: e.target.value})} />
                            </div>
                            <div className="flex-1">
                                <label className="block text-xs font-bold text-slate-500 mb-1">ساعات العمل شهرياً</label>
                                <input type="number" className="w-full border border-slate-200 rounded-xl px-4 py-3 bg-slate-50 focus:bg-white focus:border-primary outline-none font-bold text-left text-slate-700" dir="ltr" value={formData.workingHours} onChange={e => setFormData({...formData, workingHours: e.target.value})} placeholder="الافتراضي: 240" />
                            </div>
                        </div>
                        <button onClick={() => { if(formData.name && formData.basicSalary) onSave(formData); else alert('يرجى تعبئة الاسم والراتب الأساسي.'); }} className="w-full bg-primary text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-500/30 hover:bg-blue-600 transition mt-6 text-lg">
                            {editItem ? 'حفظ التعديلات' : 'تسجيل الموظف'}
                        </button>
                    </div>
                </BottomSheet>
            );
        }

        function TransactionModal({ employee, hourlyRate, onClose, onSave, editItem }) {
            const [type, setType] = useState(editItem ? editItem.type : 'advance');
            const [calcMode, setCalcMode] = useState('money');
            const [inputValue, setInputValue] = useState(editItem ? editItem.amount : '');
            const [reason, setReason] = useState(editItem ? editItem.reason : '');
            
            const types = [{ id:'advance', name:'سلفة مالية', color:'rose' }, { id:'deduction', name:'خصم', color:'rose' }, { id:'bonus', name:'إضافي', color:'primary' }];

            return (
                <BottomSheet title={editItem ? `تعديل عملية لـ: ${employee.name}` : `إجراء على: ${employee.name}`} onClose={onClose}>
                    <div className="space-y-6">
                        <div className="flex bg-slate-100 rounded-xl p-1 gap-1">
                            {types.map(t => <button key={t.id} onClick={() => setType(t.id)} className={`flex-1 py-2.5 rounded-lg text-sm font-bold transition ${type === t.id ? `bg-white shadow-sm text-${t.color === 'primary' ? 'primary' : 'rose-500'}` : 'text-slate-500'}`}>{t.name}</button>)}
                        </div>
                        {type !== 'advance' && !editItem && (
                            <div className="flex justify-center gap-6 text-sm bg-slate-50 p-2 rounded-xl border border-slate-100">
                                <label className="flex items-center cursor-pointer gap-2 font-bold text-slate-700"><input type="radio" checked={calcMode==='money'} onChange={()=>setCalcMode('money')} className="accent-primary w-4 h-4" /> مبلغ مالي</label>
                                <label className="flex items-center cursor-pointer gap-2 font-bold text-slate-700"><input type="radio" checked={calcMode==='hours'} onChange={()=>setCalcMode('hours')} className="accent-primary w-4 h-4" /> حساب بالساعات</label>
                            </div>
                        )}
                        <div className="relative bg-slate-50 rounded-2xl p-6 border border-slate-200 focus-within:border-primary focus-within:ring-4 ring-primary/10 transition">
                            <input type="number" className="w-full text-center text-5xl font-black text-slate-800 focus:outline-none bg-transparent" placeholder="0" value={inputValue} onChange={e=>setInputValue(e.target.value)} autoFocus dir="ltr" />
                            <div className="text-center text-sm text-slate-400 font-bold mt-2">{calcMode === 'hours' ? 'ساعة عمل' : 'دينار'}</div>
                        </div>
                        {calcMode === 'hours' && inputValue && <p className="text-center text-sm text-primary font-bold bg-blue-50 py-3 rounded-xl border border-blue-100"><i className="fas fa-calculator ml-1"></i> يعادل مالياً: {formatMoney(Number(inputValue) * Number(hourlyRate))} دينار</p>}
                        <div>
                            <label className="block text-xs font-bold text-slate-500 mb-1">السبب أو البيان</label>
                            <input type="text" placeholder="مثال: تأخير، مكافأة أداء..." className="w-full border border-slate-200 rounded-xl px-4 py-3 bg-slate-50 focus:bg-white focus:border-primary outline-none font-bold" value={reason} onChange={e=>setReason(e.target.value)} />
                        </div>
                        <button onClick={() => {
                            if(!inputValue || !reason) { alert('الرجاء إدخال القيمة والبيان'); return; }
                            let amt = calcMode === 'hours' ? (Number(inputValue)*Number(hourlyRate)).toFixed(2) : inputValue;
                            let rsn = calcMode === 'hours' ? `${reason} (${inputValue} ساعة)` : reason;
                            
                            onSave({ 
                                type, 
                                amount: amt, 
                                reason: rsn, 
                                date: editItem ? editItem.date : new Date().toISOString() 
                            });
                        }} className="w-full bg-dark text-white font-bold py-4 rounded-xl shadow-lg hover:bg-slate-800 transition text-lg">
                            {editItem ? 'حفظ التعديلات' : 'تأكيد وتنفيذ العملية'}
                        </button>
                    </div>
                </BottomSheet>
            );
        }

        function ExpenseModal({ editItem, onClose, onSave }) {
            const [formData, setFormData] = useState(editItem || { name: '', amount: '', category: 'عام', date: new Date().toISOString().slice(0, 10) });
            return (
                <BottomSheet title={editItem ? "تعديل المصروف" : "تسجيل مصروف جديد"} onClose={onClose}>
                    <div className="space-y-5">
                        <div className="relative bg-rose-50 rounded-2xl p-6 border border-rose-100 focus-within:border-rose-300 focus-within:ring-4 ring-rose-500/10 transition">
                            <input type="number" placeholder="0" className="w-full bg-transparent text-center text-5xl font-black text-rose-600 focus:outline-none" value={formData.amount} onChange={e => setFormData({...formData, amount: e.target.value})} dir="ltr" autoFocus />
                            <div className="text-center text-sm text-rose-400 font-bold mt-2">القيمة الإجمالية</div>
                        </div>
                        <div>
                            <label className="block text-xs font-bold text-slate-500 mb-1">بيان المصروف</label>
                            <input type="text" placeholder="مثال: فاتورة كهرباء، صيانة أجهزة..." className="w-full border border-slate-200 rounded-xl px-4 py-3 bg-slate-50 focus:bg-white focus:border-rose-400 outline-none font-bold" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                        </div>
                        <div>
                            <label className="block text-xs font-bold text-slate-500 mb-1">تصنيف المصروف</label>
                            <select className="w-full border border-slate-200 rounded-xl px-4 py-3 bg-slate-50 focus:bg-white focus:border-rose-400 outline-none font-bold text-slate-700" value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})}>
                                <option value="عام">مصروفات عامة</option>
                                <option value="تشغيل">مصروفات تشغيلية</option>
                                <option value="مشتريات">مشتريات</option>
                                <option value="صيانة">صيانة</option>
                            </select>
                        </div>
                        <button onClick={() => { if(formData.name && formData.amount) onSave(formData); else alert('الرجاء تعبئة القيمة والبيان'); }} className="w-full bg-rose-500 text-white font-bold py-4 rounded-xl shadow-lg shadow-rose-500/30 hover:bg-rose-600 transition mt-2 text-lg">
                            {editItem ? 'حفظ التعديلات' : 'اعتماد المصروف'}
                        </button>
                    </div>
                </BottomSheet>
            );
        }

        const getTransTypeName = (t) => t==='advance'?'سلفة مالية':t==='deduction'?'خصم':t==='bonus'?'مكافأة/إضافي':'راتب';

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
